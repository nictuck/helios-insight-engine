[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8889

[functions]
  directory = "netlify/functions"
  included_files = ["netlify/functions/prompts/**"]

[[redirects]]
  from = "/test-insights.html"
  to = "/test-insights.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
